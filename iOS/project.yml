name: Divelog
options:
  bundleIdPrefix: com.shimondeitel.scubarental
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Divelog:
    type: application
    platform: iOS
    sources:
      - path: Divelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.scubarental
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Divelog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DivelogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DivelogTests
      - path: Divelog.storekit
    dependencies:
      - target: Divelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.scubarental.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DivelogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DivelogUITests
    dependencies:
      - target: Divelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.scubarental.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Divelog:
    build:
      targets:
        Divelog: all
        DivelogTests: [test]
        DivelogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Divelog.storekit
    test:
      config: Debug
      storeKitConfiguration: Divelog.storekit
      targets:
        - DivelogTests
        - DivelogUITests
    archive:
      config: Release
